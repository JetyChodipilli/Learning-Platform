<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduPlatform | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>EduPlatform</h1>
    </header>

    <div class="container" style="max-width: 450px; padding-top: 10vh;">
        <div class="glass-panel">
            <h2 style="text-align: center; margin-bottom: 2rem;">Parent Registration</h2>
            
            <div id="errorBox" class="alert alert-error" style="display: none;"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="parent@edu.com">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">
                </div>
                
                <div class="form-group">
                    <label>Time Zone</label>
                    <select id="timezone" required>
                        <option value="America/New_York">America/New_York (EST/EDT)</option>
                        <option value="Europe/London">Europe/London (GMT/BST)</option>
                        <option value="Asia/Kolkata">Asia/Kolkata (IST)</option>
                        <option value="Australia/Sydney">Australia/Sydney (AEST)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="regBtn" style="margin-top: 1rem;">Create Account</button>
            </form>
            
            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
                Already have an account? <a th:href="@{/}" style="color: var(--primary);">Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const errorBox = document.getElementById('errorBox');
            
            btn.innerText = 'Creating account...';
            btn.disabled = true;
            errorBox.style.display = 'none';
            
            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                timezone: document.getElementById('timezone').value
            };
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    // Registration sets the cookie automatically
                    window.location.href = '/ui/parent/dashboard';
                } else {
                    errorBox.innerText = 'Registration failed. Email might be in use.';
                    errorBox.style.display = 'block';
                    btn.innerText = 'Create Account';
                    btn.disabled = false;
                }
            } catch (err) {
                errorBox.innerText = 'Network error occurred.';
                errorBox.style.display = 'block';
                btn.innerText = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
